name: Weekly Supabase Database Backup

on:
  schedule:
    # Every Monday at 8:00 AM Philippine Time (UTC+8) = 00:00 UTC Monday
    - cron: '0 0 * * 1'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab anytime

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Step 1: Checkout repository ───────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 2: Set backup date/time variables ────────────────────
      - name: Set backup timestamp
        id: timestamp
        run: |
          # Philippine Time = UTC+8
          BACKUP_DATE=$(TZ='Asia/Manila' date '+%Y-%m-%d')
          BACKUP_TIME=$(TZ='Asia/Manila' date '+%H%M')
          BACKUP_FOLDER="backups/${BACKUP_DATE}"
          echo "date=${BACKUP_DATE}" >> $GITHUB_OUTPUT
          echo "time=${BACKUP_TIME}" >> $GITHUB_OUTPUT
          echo "folder=${BACKUP_FOLDER}" >> $GITHUB_OUTPUT
          echo "Backup Date: ${BACKUP_DATE} | Time: ${BACKUP_TIME} PHT"

      # ── Step 3: Create backup folder ─────────────────────────────
      - name: Create backup directory
        run: |
          mkdir -p ${{ steps.timestamp.outputs.folder }}
          echo "Created folder: ${{ steps.timestamp.outputs.folder }}"

      # ── Step 4: Export CLIENTS table ─────────────────────────────
      - name: Export clients table
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Accept: text/csv" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/clients?order=name.asc&select=clientcode,name,branchcode,change,moc,pnno" \
            -o "${{ steps.timestamp.outputs.folder }}/clients.csv"
          COUNT=$(tail -n +2 "${{ steps.timestamp.outputs.folder }}/clients.csv" | wc -l)
          echo "Clients exported: ${COUNT} records"

      # ── Step 5: Export CHANGES / TRANSACTIONS table ───────────────
      - name: Export changes table
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Accept: text/csv" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/changes?order=id.desc&select=id,branchcode,clientcode,date,arnumber,amount,remarks,printedby,printeddatetime" \
            -o "${{ steps.timestamp.outputs.folder }}/changes.csv"
          COUNT=$(tail -n +2 "${{ steps.timestamp.outputs.folder }}/changes.csv" | wc -l)
          echo "Changes exported: ${COUNT} records"

      # ── Step 6: Export BRANCHES table ────────────────────────────
      - name: Export branches table
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Accept: text/csv" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/branches?order=name.asc&select=code,name,address,status" \
            -o "${{ steps.timestamp.outputs.folder }}/branches.csv"
          COUNT=$(tail -n +2 "${{ steps.timestamp.outputs.folder }}/branches.csv" | wc -l)
          echo "Branches exported: ${COUNT} records"

      # ── Step 7: Export MOC table ──────────────────────────────────
      - name: Export moc table
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Accept: text/csv" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/moc?order=moc.asc&select=moc,description" \
            -o "${{ steps.timestamp.outputs.folder }}/moc.csv"
          COUNT=$(tail -n +2 "${{ steps.timestamp.outputs.folder }}/moc.csv" | wc -l)
          echo "MOC exported: ${COUNT} records"

      # ── Step 8: Export USERS table (no passwords) ─────────────────
      - name: Export users table
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Accept: text/csv" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/users?order=lastname.asc&select=loginname,lastname,firstname,middlename,extname,email,position,systemaccess,uploadaccess,administrator" \
            -o "${{ steps.timestamp.outputs.folder }}/users.csv"
          COUNT=$(tail -n +2 "${{ steps.timestamp.outputs.folder }}/users.csv" | wc -l)
          echo "Users exported: ${COUNT} records"

      # ── Step 9: Export NBMASTER table ────────────────────────────
      - name: Export nbmaster table
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Accept: text/csv" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/nbmaster?order=id.desc&select=id,clientcode,pnno,name,amount,batchno" \
            -o "${{ steps.timestamp.outputs.folder }}/nbmaster.csv"
          COUNT=$(tail -n +2 "${{ steps.timestamp.outputs.folder }}/nbmaster.csv" | wc -l)
          echo "NBMaster exported: ${COUNT} records"

      # ── Step 10: Create backup summary ───────────────────────────
      - name: Create backup summary
        run: |
          CLIENTS=$(tail -n +2 "${{ steps.timestamp.outputs.folder }}/clients.csv" | wc -l)
          CHANGES=$(tail -n +2 "${{ steps.timestamp.outputs.folder }}/changes.csv" | wc -l)
          BRANCHES=$(tail -n +2 "${{ steps.timestamp.outputs.folder }}/branches.csv" | wc -l)
          MOC=$(tail -n +2 "${{ steps.timestamp.outputs.folder }}/moc.csv" | wc -l)
          USERS=$(tail -n +2 "${{ steps.timestamp.outputs.folder }}/users.csv" | wc -l)
          NBMASTER=$(tail -n +2 "${{ steps.timestamp.outputs.folder }}/nbmaster.csv" | wc -l)
          TOTAL=$((CLIENTS + CHANGES + BRANCHES + MOC + USERS + NBMASTER))

          cat > "${{ steps.timestamp.outputs.folder }}/BACKUP_SUMMARY.txt" << EOF
          ============================================================
          NEXTBANK-FASTCASH LMS - DATABASE BACKUP SUMMARY
          ============================================================
          Backup Date  : ${{ steps.timestamp.outputs.date }}
          Backup Time  : ${{ steps.timestamp.outputs.time }} PHT
          System URL   : https://nbccs.fcash.com.ph
          ============================================================
          TABLE               RECORDS
          ============================================================
          Clients             ${CLIENTS}
          Changes             ${CHANGES}
          Branches            ${BRANCHES}
          MOC                 ${MOC}
          Users               ${USERS}
          NB Master           ${NBMASTER}
          ------------------------------------------------------------
          TOTAL RECORDS       ${TOTAL}
          ============================================================
          Files in this backup:
          - clients.csv
          - changes.csv
          - branches.csv
          - moc.csv
          - users.csv
          - nbmaster.csv
          - BACKUP_SUMMARY.txt
          ============================================================
          NOTE: User passwords are NOT included in this backup.
          NOTE: This backup was generated automatically by GitHub Actions.
          ============================================================
          EOF
          echo "Backup summary created"
          echo ""
          echo "====== BACKUP COMPLETE ======"
          cat "${{ steps.timestamp.outputs.folder }}/BACKUP_SUMMARY.txt"

      # ── Step 11: Commit and push backup files ─────────────────────
      - name: Commit backup to repository
        run: |
          git config --global user.name "NBCCS Backup Bot"
          git config --global user.email "backup@nbccs.fcash.com.ph"
          git add backups/
          git commit -m "Auto-backup: ${{ steps.timestamp.outputs.date }} ${{ steps.timestamp.outputs.time }} PHT" || echo "No changes to commit"
          git push

      # ── Step 12: Cleanup old backups (keep last 12 weeks) ─────────
      - name: Cleanup old backups
        run: |
          cd backups
          # List all backup folders sorted by date, keep newest 12
          ls -1d */ 2>/dev/null | sort | head -n -12 | while read folder; do
            echo "Removing old backup: ${folder}"
            git rm -r "${folder}" 2>/dev/null || rm -rf "${folder}"
          done
          if git diff --cached --quiet; then
            echo "No old backups to remove"
          else
            git commit -m "Cleanup: removed backups older than 12 weeks"
            git push
          fi
