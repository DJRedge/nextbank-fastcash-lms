name: Supabase Daily Backup

on:
  schedule:
    - cron: '0 0 * * *'   # Daily at midnight UTC (8 AM Manila)
  workflow_dispatch:        # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set backup timestamp (Manila time)
        id: timestamp
        run: |
          TIMESTAMP=$(TZ='Asia/Manila' date '+%Y-%m-%d_%H-%M')
          DATE=$(TZ='Asia/Manila' date '+%Y-%m-%d')
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Export database tables to temp CSV files
        id: export
        run: |
          SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          SUPABASE_KEY="${{ secrets.SUPABASE_SERVICE_KEY }}"
          TMPDIR=$(mktemp -d)
          echo "tmpdir=$TMPDIR" >> $GITHUB_OUTPUT

          TABLES=("clients" "changes" "branches" "moc" "users" "nbmaster")
          FAILED=0

          for TABLE in "${TABLES[@]}"; do
            echo "Exporting $TABLE..."
            HTTP_STATUS=$(curl -s -o "$TMPDIR/${TABLE}.csv" -w "%{http_code}" \
              "${SUPABASE_URL}/rest/v1/${TABLE}?select=*" \
              -H "apikey: ${SUPABASE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" \
              -H "Accept: text/csv")

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "ERROR: Failed to export $TABLE (HTTP $HTTP_STATUS)"
              FAILED=1
            else
              ROWS=$(wc -l < "$TMPDIR/${TABLE}.csv")
              echo "$TABLE exported: $ROWS rows"
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "One or more exports failed — aborting backup."
            exit 1
          fi

      - name: Upload CSV exports to Supabase Storage (private bucket)
        run: |
          SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          SUPABASE_KEY="${{ secrets.SUPABASE_SERVICE_KEY }}"
          TMPDIR="${{ steps.export.outputs.tmpdir }}"
          DATE="${{ steps.timestamp.outputs.date }}"
          TABLES=("clients" "changes" "branches" "moc" "users" "nbmaster")

          for TABLE in "${TABLES[@]}"; do
            STORAGE_PATH="${DATE}/${TABLE}.csv"
            echo "Uploading $TABLE to storage: $STORAGE_PATH"

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "${SUPABASE_URL}/storage/v1/object/db-backups/${STORAGE_PATH}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" \
              -H "Content-Type: text/csv" \
              -H "x-upsert: true" \
              --data-binary "@${TMPDIR}/${TABLE}.csv")

            if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
              echo "ERROR: Failed to upload $TABLE to storage (HTTP $HTTP_STATUS)"
              exit 1
            fi
            echo "$TABLE uploaded successfully."
          done

      - name: Generate backup summary (no sensitive data)
        run: |
          SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          SUPABASE_KEY="${{ secrets.SUPABASE_SERVICE_KEY }}"
          DATE="${{ steps.timestamp.outputs.date }}"
          TIMESTAMP="${{ steps.timestamp.outputs.timestamp }}"
          TMPDIR="${{ steps.export.outputs.tmpdir }}"
          SUMMARY_DIR="backups/${DATE}"

          mkdir -p "$SUMMARY_DIR"

          get_count() {
            local file="$TMPDIR/$1.csv"
            if [ -f "$file" ]; then
              echo $(( $(wc -l < "$file") - 1 ))
            else
              echo "N/A"
            fi
          }

          CLIENTS=$(get_count "clients")
          CHANGES=$(get_count "changes")
          BRANCHES=$(get_count "branches")
          MOC=$(get_count "moc")
          USERS=$(get_count "users")
          NBMASTER=$(get_count "nbmaster")
          TOTAL=$(( CLIENTS + CHANGES + BRANCHES + MOC + USERS + NBMASTER ))

          cat > "$SUMMARY_DIR/BACKUP_SUMMARY.txt" << EOF
          ================================================
            NEXTBANK-FASTCASH LMS — Backup Summary
          ================================================
          Date     : $DATE
          Time     : $TIMESTAMP PHT
          Site     : https://nbccs.fcash.com.ph/

          Record Counts:
            Clients          : $CLIENTS
            Changes/Trans.   : $CHANGES
            Branches         : $BRANCHES
            MOC              : $MOC
            Users            : $USERS
            NB Master        : $NBMASTER
          ------------------------------------------------
            TOTAL            : $TOTAL records

          Storage: Uploaded to Supabase Storage bucket [db-backups]
          Note: Passwords are NOT included in backups.
          Note: Raw data is stored in Supabase Storage ONLY,
                not committed to this repository.
          ================================================
          EOF

          echo "Summary written to $SUMMARY_DIR/BACKUP_SUMMARY.txt"
          cat "$SUMMARY_DIR/BACKUP_SUMMARY.txt"

      - name: Remove backups older than 90 days
        run: |
          BACKUP_COUNT=$(ls -d backups/20*/ 2>/dev/null | wc -l)
          if [ "$BACKUP_COUNT" -gt 90 ]; then
            ls -d backups/20*/ | sort | head -n $(( BACKUP_COUNT - 90 )) | xargs rm -rf
            echo "Pruned old backup summaries."
          fi

      - name: Commit backup summary to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily backup summary ${{ steps.timestamp.outputs.date }}"
            git push
          fi

      - name: Clean up temp files
        if: always()
        run: rm -rf "${{ steps.export.outputs.tmpdir }}"
